<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFQ - Reporte Operativo Diario</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0A0A0F;
            --bg-card: #111827;
            --bg-elevated: #1f2937;
            --text-main: #F8FAFC;
            --text-dim: #D1D5DB;
            --primary: #FF4B4B;
            --secondary: #2962FF;
            --gradient-nfq: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        }
        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            padding: 30px;
            margin: 0;
        }
        .report-header {
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 20px;
        }
        .badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            background: rgba(255, 75, 75, 0.15);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 4px;
            text-transform: uppercase;
        }
        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2rem;
            margin-top: 15px;
            margin-bottom: 5px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 25px;
        }
        .card {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-elevated) 100%);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px;
            position: relative;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--gradient-nfq);
        }
        .card h3 {
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .metric {
            font-size: 2.2rem;
            font-weight: 800;
            font-family: 'Montserrat', sans-serif;
            background: var(--gradient-nfq);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Gráfico de Barras CSS Nativo */
        .chart-container {
            margin-top: 30px;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .bar-group {
            margin-bottom: 15px;
        }
        .bar-label {
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
        }
        .bar-track {
            background: rgba(255, 255, 255, 0.05);
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: var(--gradient-nfq);
            border-radius: 6px;
            transition: width 1s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="report-header">
        <span class="badge">Sistemas v4.2</span>
        <h1>Rendimiento de Infraestructura Diaria</h1>
        <p style="color: var(--text-dim); margin: 5px 0 0 0;">Fecha de extracción: 30 de Junio, 2026</p>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Disponibilidad General</h3>
            <div class="metric">99.98%</div>
        </div>
        <div class="card">
            <h3>Peticiones Procesadas</h3>
            <div class="metric">3.4M</div>
        </div>
        <div class="card">
            <h3>Tiempo Medio Respuesta</h3>
            <div class="metric">42ms</div>
        </div>
    </div>

    <div class="chart-container">
        <h3 style="font-family: 'Montserrat', sans-serif; margin-top: 0; margin-bottom: 20px;">Carga por Entornos</h3>
        
        <div class="bar-group">
            <div class="bar-label"><span>Entorno Producción (PROD)</span> <span>88%</span></div>
            <div class="bar-track"><div class="bar-fill" style="width: 88%;"></div></div>
        </div>
        <div class="bar-group">
            <div class="bar-label"><span>Entorno Preproducción (PRE)</span> <span>45%</span></div>
            <div class="bar-track"><div class="bar-fill" style="width: 45%; background: var(--secondary);"></div></div>
        </div>
        <div class="bar-group">
            <div class="bar-label"><span>Entorno Integración (INT)</span> <span>22%</span></div>
            <div class="bar-track"><div class="bar-fill" style="width: 22%; background: var(--text-dim);"></div></div>
        </div>
    </div>
</body>
</html>
